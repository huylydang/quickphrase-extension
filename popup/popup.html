<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickPhrase</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      min-height: 160px;
      background: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1a1a1a;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.02em;
    }

    .status-card {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    .status-label {
      color: #666;
    }

    .status-value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected {
      background: #16a34a;
      box-shadow: 0 0 6px rgba(22, 163, 74, 0.3);
    }

    .status-dot.disconnected {
      background: #dc2626;
      box-shadow: 0 0 6px rgba(220, 38, 38, 0.3);
    }

    .provider-info {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #888;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-settings {
      background: linear-gradient(135deg, #06b6d4, #10b981);
      color: #fff;
    }

    .btn-settings:hover {
      box-shadow: 0 4px 16px rgba(6, 182, 212, 0.3);
      transform: translateY(-1px);
    }

    .version {
      text-align: center;
      margin-top: 14px;
      font-size: 11px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-32.png" alt="QuickPhrase" class="logo">
    <span class="title">QuickPhrase</span>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">API Status</span>
      <span class="status-value" id="status-value">
        <span class="status-dot disconnected" id="status-dot"></span>
        <span id="status-text">Checking...</span>
      </span>
    </div>
    <div class="provider-info" id="provider-info">—</div>
  </div>

  <button class="btn btn-settings" id="btn-settings">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </button>

  <div class="version">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
